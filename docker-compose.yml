services:
  postgres:
    image: postgres:17-alpine
    container_name: amg-postgres
    environment:
      POSTGRES_USER: amg
      POSTGRES_PASSWORD: amg_dev_password
      POSTGRES_DB: amg_portal
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c effective_cache_size=1GB
        -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amg-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: amg-minio
    environment:
      MINIO_ROOT_USER: amg_minio
      MINIO_ROOT_PASSWORD: amg_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
