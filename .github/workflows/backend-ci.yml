# Backend CI — ruff, mypy, pytest.
#
# Every `uses:` below is pinned by 40-char SHA with a version comment
# (security-plan 0.8). Dependabot's `github-actions` group in
# `.github/dependabot.yml` bumps the SHA + comment in lockstep.
#
# Pin sources (verified via grep.app):
#   - actions/checkout@de0fac2   pydantic/pydantic, TryGhost/Ghost, astral-sh/ruff
#   - astral-sh/setup-uv@cec2083 pydantic/pydantic, astral-sh/ruff, openai/openai-agents-python
#   - actions/setup-python@a309f astral-sh/uv, astral-sh/ruff, freqtrade/freqtrade

name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

# Cancel redundant runs when a PR is force-pushed.
concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amg_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      # Ephemeral test config — no real secrets leave CI.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/amg_portal_test
      REDIS_URL: redis://localhost:6379/0
      DEBUG: "true"
      SECRET_KEY: ci-only-secret-key-do-not-use-in-prod-abcdefghijklmnopqrstuvwxyz0123456789
      MINIO_ACCESS_KEY: ci-access
      MINIO_SECRET_KEY: ci-secret

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install system deps (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0

      - name: Install project (+ dev extras)
        run: uv sync --extra dev --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Alembic upgrade head
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest -q
